services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: recipe_service
      POSTGRES_USER: recipe_user
      POSTGRES_PASSWORD: recipe_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init/00-create-test-db.sql:/docker-entrypoint-initdb.d/00-create-test-db.sql:ro
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipe_user -d recipe_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  recipe_service:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  postgres_data:
